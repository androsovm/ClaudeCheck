name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Derive version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build universal .app
        run: make release-zip VERSION=${{ steps.ver.outputs.version }}

      - name: Compute sha256
        id: sha
        run: |
          SHA=$(shasum -a 256 dist/ClaudeCheck-${{ steps.ver.outputs.version }}.zip | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            "dist/ClaudeCheck-${{ steps.ver.outputs.version }}.zip" \
            --title "v${{ steps.ver.outputs.version }}" \
            --generate-notes

      # Homebrew tap bump. Requires a PAT in HOMEBREW_TAP_TOKEN with
      # `contents: write` on androsovm/homebrew-tap. If the secret is absent
      # we skip — useful for first-run or forks.
      - name: Bump Homebrew cask
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/androsovm/homebrew-tap.git" tap
          cd tap
          python3 - <<PY
          import re, pathlib
          path = pathlib.Path("Casks/claude-check.rb")
          text = path.read_text()
          text = re.sub(r'version "[^"]+"', f'version "${VERSION}"', text)
          text = re.sub(r'sha256 "[^"]+"', f'sha256 "${SHA256}"', text)
          path.write_text(text)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/claude-check.rb
          git commit -m "claude-check ${VERSION}"
          git push
